name: Rebuild Full Model From Parts

on:
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Show repo files
        run: |
          echo "=== Files in repo ==="
          ls -lh

      - name: Check ZIP parts exist
        run: |
          echo "=== Checking for ZIP files ==="
          count=$(ls part_*.zip 2>/dev/null | wc -l)
          echo "Found $count ZIP files"
          if [ "$count" -eq 0 ]; then
            echo "ERROR: No part_*.zip files found in repo root!"
            exit 1
          fi

      - name: Unzip & Rebuild
        run: |
          echo "=== Starting rebuild ==="
          mkdir extracted

          for part in $(ls part_*.zip | sort); do
            echo "Processing $part ..."
            unzip -p "$part" >> extracted/model.bin || exit 2
          done

      - name: Rename to final file
        run: mv extracted/model.bin Realistic_Vision_V6.safetensors

      - name: Final size check
        run: ls -lh Realistic_Vision_V6.safetensors

      - name: Upload final model
        uses: actions/upload-artifact@v4
        with:
          name: RealisticVisionV6-Full
          path: Realistic_Vision_V6.safetensors
