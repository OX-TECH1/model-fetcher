name: Download RealVisXL V4

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch_model:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:

    - name: Install Requirements
      run: |
        sudo apt update
        sudo apt install -y aria2 jq

    - name: Define Links
      run: |
        echo "LINKS<<EOF" >> $GITHUB_ENV
        echo "https://huggingface.co/SG161222/RealVisXL_V4.0/resolve/main/RealVisXL_V4.0.safetensors" >> $GITHUB_ENV
        echo "https://huggingface.co/SG161222/RealVisXL_V4.0/resolve/main/realvisxlV40.safetensors" >> $GITHUB_ENV
        echo "https://huggingface.co/SG161222/RealVisXL_V4.0/resolve/main/RealVisXL_V40.safetensors" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    - name: Try Download
      id: find_link
      run: |
        FOUND=""
        while read url; do
          echo "Checking URL: $url"

          STATUS=$(curl -L -s -o /dev/null -w "%{http_code}" "$url")

          if [[ "$STATUS" == "200" ]]; then
            echo "Valid link found: $url"
            FOUND="$url"
            break
          else
            echo "URL returned HTTP $STATUS"
          fi

        done <<< "$LINKS"

        if [[ -z "$FOUND" ]]; then
          echo "No working link found!"
          exit 1
        fi

        echo "FOUND=$FOUND" >> $GITHUB_ENV

    - name: Download via aria2
      run: |
        echo "Downloading from: $FOUND"

        aria2c \
          -x 16 -s 16 -k 1M \
          --conditional-get=true \
          --file-allocation=none \
          -o model.safetensors \
          "$FOUND"

        ls -lh model.safetensors

    - name: Verify integrity
      run: |
        SIZE=$(stat -c%s model.safetensors)
        echo "Size: $SIZE"

        if [[ "$SIZE" -lt 1500000000 ]]; then
          echo "File size too small, probably corrupted"
          exit 1
        fi

        echo "Integrity OK!"

    - name: Split 500MB parts
      run: |
        mkdir parts
        split -b 500M model.safetensors parts/realvis.part.
        ls -lh parts/

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: realvis-v4
        name: RealVisXL V4 Split Parts
        files: parts/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
