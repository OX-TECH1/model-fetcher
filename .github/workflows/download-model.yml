name: Safe Store RealVisXL Model

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:

    - uses: actions/checkout@v4

    - name: Install tools
      run: |
        sudo apt update
        sudo apt install -y aria2

    - name: Download model
      run: |
        echo "Downloading RealVisXL V4.0..."
        aria2c -x 16 -s 16 -k 1M \
        -o model.safetensors \
        https://huggingface.co/SG161222/RealVisXL_V4.0/resolve/main/RealVisXL_V4.0.safetensors

    - name: Generate SHA256 checksum
      run: |
        echo "Calculating original SHA256..."
        sha256sum model.safetensors | tee sha256_original.txt

    - name: Split model file
      run: |
        mkdir files
        split -b 95M model.safetensors files/realvis.part.
        echo "Splitting done."

    - name: Commit parts + checksum
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"

        git add files/*
        git add sha256_original.txt
        git commit -m "Add RealVisXL model (split parts) + SHA256"
        git push
