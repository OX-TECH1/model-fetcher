name: Download Model

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Install aria2
        run: sudo apt-get update && sudo apt-get install -y aria2

      - name: Download model
        run: |
          aria2c -x 16 -s 16 -k 1M -o model.safetensors https://huggingface.co/SG161222/RealVisXL_V3.0/resolve/main/RealVisXL_V3.0.safetensors

      - name: Split file
        run: |
          split -b 1900M model.safetensors model.part-

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: model_parts
          path: model.part-*
