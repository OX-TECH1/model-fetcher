name: Fetch Model

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install aria2
      run: sudo apt-get install -y aria2

    - name: Download model
      run: |
        aria2c -x 16 -s 16 -k 1M -o model.safetensors "MODEL_URL"

    - name: Split model
      run: |
        split -b 500M model.safetensors model.part-

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: model-release
        name: Model Parts
        files: model.part-*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
