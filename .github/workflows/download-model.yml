name: Download Split And Release Model

on:
  workflow_dispatch:
    inputs:
      model_url:
        description: "Direct download URL of model file"
        required: true
        type: string
      model_name:
        description: "Output model filename"
        required: true
        default: "RealVisXL_V4.0.safetensors"
        type: string
      part_size:
        description: "Split size in MB"
        required: true
        default: "500"
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 coreutils

      - name: Download model
        run: |
          aria2c \
            -x 16 -s 16 -k 1M \
            -o "${{ inputs.model_name }}" \
            "${{ inputs.model_url }}"

      - name: Split model into parts
        run: |
          mkdir -p parts
          split -b "${{ inputs.part_size }}M" -d -a 3 "${{ inputs.model_name }}" "parts/${{ inputs.model_name }}.part-"
          ls -lh parts/

      - name: Create release tag
        id: tag
        run: echo "tag=model-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

      - name: Upload split parts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: RealVisXL V4.0 split parts
          body: |
            Split model parts uploaded automatically.
          files: |
            parts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
