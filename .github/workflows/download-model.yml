name: Rebuild Full Model From Parts

on:
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: List ZIP parts
        run: |
          echo "Available ZIP parts:"
          ls -lh *.zip

      - name: Unzip All Parts
        run: |
          mkdir extracted
          for part in $(ls part_*.zip | sort); do
            echo "Unzipping $part ..."
            unzip -p "$part" >> extracted/model_combined.bin
          done

      - name: Rename to final safetensors
        run: |
          mv extracted/model_combined.bin Realistic_Vision_V6.safetensors

      - name: Check final model size
        run: ls -lh Realistic_Vision_V6.safetensors

      - name: Uplo Final Model
        uses: actions/upload-artifact@v4
        with:
          name: RealisticVisionV6-Full
          path: Realistic_Vision_V6.safetensors
