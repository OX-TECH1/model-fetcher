name: Fetch RealisticVisionV6

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Download RealisticVision V6 with forced user-agent
        run: |
          echo "Starting download..."
          curl -L \
            -H "User-Agent: Mozilla/5.0" \
            --retry 10 \
            --retry-all-errors \
            --retry-delay 5 \
            -o Realistic_Vision_V6.0_B1_noVAE.safetensors \
            "https://huggingface.co/SG161222/Realistic_Vision_V6.0_B1_noVAE/resolve/main/Realistic_Vision_V6.0_B1_noVAE.safetensors"

          echo "Download finished"
          ls -lh

      - name: Check file size
        run: |
          echo "--- FILE SIZE CHECK ---"
          ls -lh Realistic_Vision_V6.0_B1_noVAE.safetensors

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RealisticVisionV6
          path: Realistic_Vision_V6.0_B1_noVAE.safetensors
