name: Fetch RealisticVisionV6

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Download via CDN direct link
        run: |
          echo "Starting direct CDN download..."
          wget -O Realistic_Vision_V6.0_B1_noVAE.safetensors \
            "https://cdn-lfs.huggingface.co/repos/SG161222/Realistic_Vision_V6.0_B1_noVAE/7b9c8c91157330398c114a8edbdf389691d8ca3d8a33c31bb4b2f784a665fbf0"

          echo "Finished downloading"
          ls -lh

      - name: Check file size
        run: |
          echo "--- FILE SIZE CHECK ---"
          ls -lh Realistic_Vision_V6.0_B1_noVAE.safetensors

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RealisticVisionV6
          path: Realistic_Vision_V6.0_B1_noVAE.safetensors
