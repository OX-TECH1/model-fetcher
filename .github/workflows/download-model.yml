name: Move Artifact to Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  move_artifact:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact zip
        run: |
          curl -L "PASTE_YOUR_AZURE_LINK_HERE" -o model_parts.zip

      - name: Check file size
        run: |
          ls -lh model_parts.zip

      - name: Extract
        run: |
          mkdir parts
          unzip model_parts.zip -d parts

      - name: Upload to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: parts/*
          tag: model-files
          overwrite: true
